name: Release

on:
  workflow_dispatch:
    inputs:
        skip_tests:
          type: boolean
          description: Skip the tests
          required: true
          default: false
  push:
    tags:
      - 'v[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+-dockerupdate-[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-dockerupdate-[0-9]+'

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build
        run: docker build --target=build -t languagetool-build .
      - name: Test
        if:  ${{ inputs.skip_tests == null || inputs.skip_tests == false }} 
        run: docker run languagetool-build mvn --projects languagetool-server clean test --also-make --errors
      - name: Extract version tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="dev-${{ github.sha }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin     
      - name: Push to GitHub Container Registry
        run: |
          docker buildx build --push \
            --tag ghcr.io/${{ github.repository_owner }}/languagetool:${{ steps.get_version.outputs.version }} \
            --tag ghcr.io/${{ github.repository_owner }}/languagetool:latest \
            --platform linux/amd64,linux/arm64 .